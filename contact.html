<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Monia Favaro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-placeholder"></div>
  <main id="main-content">
    <section class="contact-section">
      <div class="container fade-in">
        <h2 class="section-title">Get In <span>Touch</span></h2>
        <div class="section-divider"></div>
        <p class="contact-desc">
          I'm open to new opportunities, collaborations, and conversations.
          Reach out through any of the channels below.
        </p>
        <div class="contact-links">
          <a href="mailto:moniafavaro@hotmail.com" class="contact-link">
            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
            <div class="contact-info">
              <span class="contact-label">Email</span>
              <span class="contact-value">moniafavaro@hotmail.com</span>
            </div>
          </a>
          <a href="https://linkedin.com/in/moniafavaro" target="_blank" rel="noopener" class="contact-link">
            <div class="contact-icon"><i class="fab fa-linkedin"></i></div>
            <div class="contact-info">
              <span class="contact-label">LinkedIn</span>
              <span class="contact-value">linkedin.com/in/moniafavaro</span>
            </div>
          </a>
          <a href="https://github.com/moniafavaro" target="_blank" rel="noopener" class="contact-link">
            <div class="contact-icon"><i class="fab fa-github"></i></div>
            <div class="contact-info">
              <span class="contact-label">GitHub</span>
              <span class="contact-value">github.com/moniafavaro</span>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
